<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title">Lookbook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="logo">Fashionista</a>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="collections.html" data-i18n="nav.collections">Collections</a></li>
        <li><a href="about.html" data-i18n="nav.about">About Us</a></li>
        <li><a href="lookbook.html" data-i18n="nav.lookbook">Lookbook</a></li>
        <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
      </ul>
    </nav>
    <select id="langSwitcher">
      <option value="en">EN</option>
      <option value="uk">UK</option>
    </select>
  </div>
</header>

<section class="lookbook container">
  <h2 data-i18n="lookbook.title">Our Lookbook</h2>
  <div class="product-grid">
    <div class="product-card">
      <div class="image-tooltip-container">
        <img src="assets/images/look1.jpg" alt="Urban Chic Look" alt-key="lookbook.caption1">
        <div class="tooltip-text" data-i18n="lookbook.caption1">Urban Chic Look</div>
      </div>
      <p data-i18n="lookbook.caption1">Urban Chic Look</p>
    </div>

    <div class="product-card">
      <div class="image-tooltip-container">
        <img src="assets/images/look2.jpg" alt="Sunset Vibes" alt-key="lookbook.caption2">
        <div class="tooltip-text" data-i18n="lookbook.caption2">Sunset Vibes</div>
      </div>
      <p data-i18n="lookbook.caption2">Sunset Vibes</p>
    </div>

    <div class="product-card">
      <div class="image-tooltip-container">
        <img src="assets/images/look3.jpg" alt="Weekend Warrior" alt-key="lookbook.caption3">
        <div class="tooltip-text" data-i18n="lookbook.caption3">Weekend Warrior</div>
      </div>
      <p data-i18n="lookbook.caption3">Weekend Warrior</p>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
