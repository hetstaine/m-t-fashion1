<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title">Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="logo">Fashionista</a>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="collections.html" data-i18n="nav.collections">Collections</a></li>
        <li><a href="about.html" data-i18n="nav.about">About Us</a></li>
        <li><a href="lookbook.html" data-i18n="nav.lookbook">Lookbook</a></li>
        <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
      </ul>
    </nav>
    <select id="langSwitcher">
      <option value="en">EN</option>
      <option value="uk">UK</option>
    </select>
  </div>
</header>

<section class="contact container">
  <h2 data-i18n="contact.title">Get in Touch</h2>
  <p data-i18n="contact.text">Have questions, suggestions, or want to collaborate? Don’t be a stranger — we love hearing from you!</p>
  <form>
    <input type="text" placeholder="Your name" required>
    <input type="email" placeholder="Your email" required>
    <textarea placeholder="Your message" required></textarea>
    <button type="submit" data-i18n="contact.cta">Send Message</button>
  </form>

  <div class="socials">
    <p data-i18n="contact.socials">Follow us on social media:</p>
    <a href="#">Instagram</a> | <a href="#">Facebook</a> | <a href="#">TikTok</a>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
